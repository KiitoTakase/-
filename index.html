<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>お天気トランプ</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Weather Playing Cards</p>
        <h1>お天気トランプ</h1>
        <p class="description">
          山札を1回タップすると一番上のカードを表示します。2回タップすると、約2秒のシャッフル演出のあとで新しい山札に切り替わります。
        </p>
      </section>

      <section class="table" aria-label="お天気トランプの表示エリア">
        <div class="status-strip">
          <p id="statusMessage" class="status-message">山札は準備OKです。</p>
          <p id="storageMessage" class="storage-message" hidden></p>
        </div>

        <div id="interactionZone" class="interaction-zone" role="button" tabindex="0" aria-label="山札を操作する">
          <div class="deck-stage">
            <div id="deck" class="deck" aria-hidden="true">
              <span class="deck-layer layer-4"></span>
              <span class="deck-layer layer-3"></span>
              <span class="deck-layer layer-2"></span>
              <span class="deck-layer layer-1"></span>
              <div class="card-back">
                <span class="cloud cloud-a"></span>
                <span class="cloud cloud-b"></span>
                <span class="cloud cloud-c"></span>
                <span class="card-back-frame"></span>
              </div>
            </div>

            <div id="shuffleBurst" class="shuffle-burst" aria-hidden="true">
              <span class="burst-card burst-1"></span>
              <span class="burst-card burst-2"></span>
              <span class="burst-card burst-3"></span>
              <span class="burst-card burst-4"></span>
              <span class="burst-card burst-5"></span>
            </div>
          </div>

          <section class="reveal-panel" aria-live="polite">
            <p class="panel-label">表向きカード</p>
            <div id="revealedCardSlot" class="revealed-card-slot is-empty">
              <p class="placeholder">1回タップでここにカードが表示されます</p>
            </div>
            <p class="hint">表示後は閉じずに残ります。次は2回タップで再シャッフルします。</p>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
